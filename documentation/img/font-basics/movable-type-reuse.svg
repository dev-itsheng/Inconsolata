<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="420" viewBox="0 0 1180 420" role="img" aria-labelledby="title desc">
  <title id="title">Movable type reuse diagram</title>
  <desc id="desc">A diagram showing reusable type blocks assembled into a page.</desc>
  <rect width="1180" height="420" rx="24" fill="#111923"/>
  <text x="56" y="58" fill="#f6f8fb" font-family="Arial, sans-serif" font-size="30" font-weight="700">Movable Type / 活字复用</text>
  <text x="56" y="92" fill="#9fb0bf" font-family="Arial, sans-serif" font-size="18">Single reusable blocks become many pages.</text>
  <g transform="translate(70 130)">
    <rect x="0" y="0" width="300" height="220" rx="14" fill="#192532" stroke="#394a5c" stroke-width="2"/>
    <text x="24" y="38" fill="#69d3b0" font-family="Arial, sans-serif" font-size="18" font-weight="700">Type Case / 字盘</text>
    <g font-family="serif" font-size="34" text-anchor="middle" fill="#f6f8fb">
      <g>
        <rect x="34" y="62" width="52" height="52" rx="8" fill="#253747"/><text x="60" y="100">字</text>
      </g>
      <g>
        <rect x="102" y="62" width="52" height="52" rx="8" fill="#253747"/><text x="128" y="100">模</text>
      </g>
      <g>
        <rect x="170" y="62" width="52" height="52" rx="8" fill="#253747"/><text x="196" y="100">可</text>
      </g>
      <g>
        <rect x="34" y="130" width="52" height="52" rx="8" fill="#253747"/><text x="60" y="168">复</text>
      </g>
      <g>
        <rect x="102" y="130" width="52" height="52" rx="8" fill="#253747"/><text x="128" y="168">用</text>
      </g>
      <g>
        <rect x="170" y="130" width="52" height="52" rx="8" fill="#253747"/><text x="196" y="168">印</text>
      </g>
    </g>
  </g>
  <path d="M405 240 H520" fill="none" stroke="#5d7488" stroke-width="4"/>
  <path d="M490 220 L526 240 L490 260" fill="none" stroke="#5d7488" stroke-width="4"/>
  <g transform="translate(560 118)">
    <rect x="0" y="0" width="250" height="244" rx="14" fill="#192532" stroke="#394a5c" stroke-width="2"/>
    <text x="24" y="38" fill="#80b7ff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Composing / 排版</text>
    <g font-family="serif" font-size="30" text-anchor="middle" fill="#f6f8fb">
      <rect x="38" y="70" width="42" height="42" rx="5" fill="#253747"/><text x="59" y="101">字</text>
      <rect x="82" y="70" width="42" height="42" rx="5" fill="#253747"/><text x="103" y="101">模</text>
      <rect x="126" y="70" width="42" height="42" rx="5" fill="#253747"/><text x="147" y="101">可</text>
      <rect x="38" y="116" width="42" height="42" rx="5" fill="#253747"/><text x="59" y="147">复</text>
      <rect x="82" y="116" width="42" height="42" rx="5" fill="#253747"/><text x="103" y="147">用</text>
      <rect x="126" y="116" width="42" height="42" rx="5" fill="#253747"/><text x="147" y="147">印</text>
      <rect x="38" y="162" width="42" height="42" rx="5" fill="#253747"/><text x="59" y="193">字</text>
      <rect x="82" y="162" width="42" height="42" rx="5" fill="#253747"/><text x="103" y="193">可</text>
      <rect x="126" y="162" width="42" height="42" rx="5" fill="#253747"/><text x="147" y="193">用</text>
    </g>
  </g>
  <path d="M842 240 H940" fill="none" stroke="#5d7488" stroke-width="4"/>
  <path d="M910 220 L946 240 L910 260" fill="none" stroke="#5d7488" stroke-width="4"/>
  <g transform="translate(972 118)">
    <rect x="0" y="0" width="150" height="244" rx="14" fill="#f3f6f8"/>
    <g fill="#1b2630" font-family="serif" font-size="24">
      <text x="28" y="54">字模可</text>
      <text x="28" y="88">复用印</text>
      <text x="28" y="122">字可用</text>
      <line x1="26" y1="146" x2="124" y2="146" stroke="#8795a1" stroke-width="2"/>
      <text x="28" y="184">同一字模</text>
      <text x="28" y="218">反复出现</text>
    </g>
  </g>
</svg>
